name: Test Infostock Crawler

on:
  workflow_dispatch:
    schedule:
        - cron: '0 1 * * 1-5'

        jobs:
          crawl:
              runs-on: ubuntu-latest

                  steps:
                        - name: Checkout
                                uses: actions/checkout@v4

                                      - name: Set up Python
                                              uses: actions/setup-python@v5
                                                      with:
                                                                python-version: '3.11'

                                                                      - name: Install dependencies
                                                                              run: |
                                                                                        pip install playwright
                                                                                                  playwright install chromium
                                                                                                            playwright install-deps chromium
                                                                                                            
                                                                                                                  - name: Run crawler test
                                                                                                                          run: |
                                                                                                                                    python - <<'EOF'
                                                                                                                                              import asyncio
                                                                                                                                                        from playwright.async_api import async_playwright
                                                                                                                                                        
                                                                                                                                                                  async def main():
                                                                                                                                                                                async with async_playwright() as p:
                                                                                                                                                                                                  browser = await p.chromium.launch(headless=True)
                                                                                                                                                                                                                    page = await browser.new_page()
                                                                                                                                                                                                                    
                                                                                                                                                                                                                                      print("=== 인포스탁 접속 중 ===")
                                                                                                                                                                                                                                                        await page.goto("https://infostock.co.kr/MarketNews/TodaySummary")
                                                                                                                                                                                                                                                                          await page.wait_for_load_state("networkidle")
                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                            # 코스피 마감시황 행 클릭
                                                                                                                                                                                                                                                                                                              rows = await page.query_selector_all("tbody tr")
                                                                                                                                                                                                                                                                                                                                print(f"게시물 수: {len(rows)}")
                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                  # 마지막 행 (코스피 마감시황) 클릭
                                                                                                                                                                                                                                                                                                                                                                    if rows:
                                                                                                                                                                                                                                                                                                                                                                                          await rows[-1].click()
                                                                                                                                                                                                                                                                                                                                                                                                                await page.wait_for_timeout(1000)
                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                  # 내용 읽기
                                                                                                                                                                                                                                                                                                                                                                                                                                                    content_el = await page.query_selector(".txtCon")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if content_el:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            text = await content_el.inner_text()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  print("=== 수집된 내용 (처음 300자) ===")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print(text[:300])
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              print("=== 수집 성공! ===")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                else:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      print("내용을 찾을 수 없습니다.")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        await browser.close()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  asyncio.run(main())
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            EOF
